name: Factory Retrospective

on:
  workflow_dispatch:
    inputs:
      context:
        description: "Optional natural-language steering context"
        required: false
        type: string
  workflow_call:
    inputs:
      context:
        description: "Optional natural-language steering context"
        required: false
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: playground-v0-fast-factory-retrospective
  cancel-in-progress: true

jobs:
  factory-retrospective:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run caretta factory retrospective
        uses: geoffsee/caretta-action@v0.0.2
        with:
          task: run
          args: factory-retrospective
          preset: software-factory
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

name: Autopilot

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      context:
        description: "Optional natural-language steering context"
        required: false
        type: string
      dry_run:
        description: "Evaluate and report the selected workflow without dispatching it"
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  checks: read
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autopilot
  cancel-in-progress: false

jobs:
  housekeeping:
    uses: ./.github/workflows/nightly-housekeeping.yml
    with:
      context: ${{ inputs.context }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  evaluate-and-dispatch:
    needs: housekeeping
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      AUTOPILOT_CONTEXT: ${{ inputs.context || 'Autopilot scheduled evaluation of open issues and pull requests.' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - name: Evaluate repository state
        id: evaluate
        shell: bash
        run: |
          set -euo pipefail

          issues_json="$(gh issue list --state open --limit 100 --json number,title,labels,updatedAt,url)"
          prs_json="$(gh pr list --state open --limit 100 --json number,title,isDraft,reviewDecision,updatedAt,url)"

          open_issue_count="$(jq 'length' <<< "$issues_json")"
          open_pr_count="$(jq 'length' <<< "$prs_json")"
          sprint="$(jq -r '[.[] | select(any(.labels[]?; .name == "sprint"))] | sort_by(.updatedAt) | reverse | .[0].number // ""' <<< "$issues_json")"
          stale_pr_count="$(jq '[.[] | select(.isDraft == false and (.reviewDecision == "CHANGES_REQUESTED" or .reviewDecision == "REVIEW_REQUIRED"))] | length' <<< "$prs_json")"

          workflow=""
          reason=""
          tracker_arg=""
          active_sprint="none"

          if [[ -n "$sprint" ]]; then
            workflow="tracker-loop-dispatch.yml"
            tracker_arg="$sprint"
            active_sprint="#$sprint"
            reason="open sprint #$sprint found; dispatching tracker loop"
          else
            workflow="factory-cycle-dispatch.yml"
            reason="no open sprint found; dispatching factory cycle"
          fi

          {
            echo "workflow=$workflow"
            echo "tracker=$tracker_arg"
            echo "sprint=$sprint"
            echo "open_issue_count=$open_issue_count"
            echo "open_pr_count=$open_pr_count"
            echo "stale_pr_count=$stale_pr_count"
            echo "reason=$reason"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Autopilot evaluation"
            echo
            echo "- Open issues: $open_issue_count"
            echo "- Open pull requests: $open_pr_count"
            echo "- Active sprint: $active_sprint"
            echo "- PRs requiring attention: $stale_pr_count"
            echo "- Selected workflow: ${workflow:-none}"
            echo "- Reason: $reason"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check target workflow activity
        id: activity
        if: steps.evaluate.outputs.workflow != ''
        shell: bash
        run: |
          set -euo pipefail

          workflow="${{ steps.evaluate.outputs.workflow }}"
          in_progress="$(gh run list --workflow "$workflow" --status in_progress --limit 1 --json databaseId --jq 'length')"
          queued="$(gh run list --workflow "$workflow" --status queued --limit 1 --json databaseId --jq 'length')"

          if (( in_progress > 0 || queued > 0 )); then
            echo "busy=true" >> "$GITHUB_OUTPUT"
            echo "Target workflow $workflow is already queued or running; skipping dispatch." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "busy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch pending PR CI
        id: pending-ci
        if: steps.activity.outputs.busy == 'false'
        shell: bash
        run: |
          set -euo pipefail

          append_entry() {
            jq -c \
              --arg number "$2" \
              --arg branch "$3" \
              --arg sha "$4" \
              --arg url "$5" \
              '. + [{number: ($number | tonumber), branch: $branch, sha: $sha, url: $url}]' \
              <<< "$1"
          }

          prs_json="$(gh pr list --state open --limit 100 --json number,headRefName,headRefOid,isDraft,mergeStateStatus,url)"
          pending_json='[]'
          dispatched_json='[]'
          active_json='[]'
          current_json='[]'
          failed_json='[]'

          while IFS=$'\t' read -r number branch sha url; do
            [[ -z "${number:-}" ]] && continue

            test_check="$(gh api "repos/$GH_REPO/commits/$sha/check-runs" \
              --jq '[.check_runs[] | select(.name == "Test")] | sort_by(.started_at // .created_at // "") | last // empty')"

            if [[ -n "$test_check" ]]; then
              current_json="$(append_entry "$current_json" "$number" "$branch" "$sha" "$url")"
              continue
            fi

            queued_runs="$(gh run list \
              --workflow ci.yml \
              --branch "$branch" \
              --status queued \
              --limit 20 \
              --json databaseId,headSha \
              | jq --arg sha "$sha" '[.[] | select(.headSha == $sha)] | length')"
            in_progress_runs="$(gh run list \
              --workflow ci.yml \
              --branch "$branch" \
              --status in_progress \
              --limit 20 \
              --json databaseId,headSha \
              | jq --arg sha "$sha" '[.[] | select(.headSha == $sha)] | length')"
            active_runs="$((queued_runs + in_progress_runs))"

            pending_json="$(append_entry "$pending_json" "$number" "$branch" "$sha" "$url")"
            if (( active_runs > 0 )); then
              active_json="$(append_entry "$active_json" "$number" "$branch" "$sha" "$url")"
              continue
            fi

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "Dry run: would dispatch CI for PR #$number ($branch @ $sha)."
            else
              echo "Dispatching CI for PR #$number ($branch @ $sha)."
              if gh workflow run ci.yml --ref "$branch"; then
                dispatched_json="$(append_entry "$dispatched_json" "$number" "$branch" "$sha" "$url")"
              else
                echo "::warning::Could not dispatch CI for PR #$number ($branch). The branch may need the tracker loop to sync the latest CI workflow from master."
                failed_json="$(append_entry "$failed_json" "$number" "$branch" "$sha" "$url")"
              fi
            fi
          done < <(
            jq -r '
              .[]
              | select(
                  .isDraft == false
                  and .mergeStateStatus != "DIRTY"
                  and (.headRefName | test("^agent/issue-[0-9]+$"))
                )
              | [.number, .headRefName, .headRefOid, .url]
              | @tsv
            ' <<< "$prs_json"
          )

          pending_count="$(jq 'length' <<< "$pending_json")"
          dispatched_count="$(jq 'length' <<< "$dispatched_json")"
          active_count="$(jq 'length' <<< "$active_json")"
          current_count="$(jq 'length' <<< "$current_json")"
          failed_count="$(jq 'length' <<< "$failed_json")"
          hold_target_count="$((dispatched_count + active_count))"
          hold_target=false
          if (( hold_target_count > 0 )) || [[ "$DRY_RUN" == "true" && "$pending_count" -gt 0 ]]; then
            hold_target=true
          fi

          {
            echo "pending_count=$pending_count"
            echo "dispatched_count=$dispatched_count"
            echo "active_count=$active_count"
            echo "current_count=$current_count"
            echo "failed_count=$failed_count"
            echo "hold_target=$hold_target"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### PR CI check"
            echo
            echo "- Current agent PRs with a Test check on their head SHA: $current_count"
            echo "- Agent PRs pending a Test check on their head SHA: $pending_count"
            echo "- Agent PRs already queued/running CI for their head SHA: $active_count"
            echo "- CI dispatches started: $dispatched_count"
            echo "- CI dispatches unavailable: $failed_count"
            if [[ "$hold_target" == "true" ]]; then
              echo "- Target workflow dispatch skipped this pass so pending tests can attach to the current PR heads."
            elif (( failed_count > 0 )); then
              echo "- Target workflow dispatch may continue so the tracker loop can refresh branches that cannot dispatch CI yet."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch tracker loop
        if: steps.evaluate.outputs.workflow == 'tracker-loop-dispatch.yml' && steps.activity.outputs.busy == 'false' && steps.pending-ci.outputs.hold_target != 'true' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run tracker-loop-dispatch.yml \
            --ref "${{ github.ref_name }}" \
            -f tracker="${{ steps.evaluate.outputs.tracker }}" \
            -f context="$AUTOPILOT_CONTEXT"

      - name: Dispatch factory cycle
        if: steps.evaluate.outputs.workflow == 'factory-cycle-dispatch.yml' && steps.activity.outputs.busy == 'false' && steps.pending-ci.outputs.hold_target != 'true' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run factory-cycle-dispatch.yml \
            --ref "${{ github.ref_name }}" \
            -f context="$AUTOPILOT_CONTEXT"

      - name: Report dry run
        if: steps.evaluate.outputs.workflow != '' && steps.activity.outputs.busy == 'false' && steps.pending-ci.outputs.hold_target != 'true' && env.DRY_RUN == 'true'
        shell: bash
        run: |
          {
            echo "Dry run enabled; would dispatch ${{ steps.evaluate.outputs.workflow }}."
            if [[ -n "${{ steps.evaluate.outputs.tracker }}" ]]; then
              echo "Tracker: #${{ steps.evaluate.outputs.tracker }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

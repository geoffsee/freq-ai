name: Autopilot

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      context:
        description: "Optional natural-language steering context"
        required: false
        type: string
      dry_run:
        description: "Evaluate only; emit summary without taking action"
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  checks: write
  contents: write
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  group: autopilot
  cancel-in-progress: false

jobs:
  autopilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: geoffsee/caretta-autopilot-action@main
        with:
          mode: execute
          caretta-version: latest
          context: ${{ inputs.context || 'Autopilot scheduled evaluation of open issues and pull requests.' }}
          dry-run: ${{ inputs.dry_run || 'false' }}
          github-token: ${{ github.token }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DEV_BOT_APP_ID: ${{ secrets.DEV_BOT_APP_ID }}
          DEV_BOT_PRIVATE_KEY_B64: ${{ secrets.DEV_BOT_PRIVATE_KEY_B64 }}

name: Autopilot

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      context:
        description: "Optional natural-language steering context"
        required: false
        type: string
      dry_run:
        description: "Evaluate and report the selected workflow without dispatching it"
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: autopilot
  cancel-in-progress: false

jobs:
  evaluate-and-dispatch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      AUTOPILOT_CONTEXT: ${{ inputs.context || 'Autopilot scheduled evaluation of open issues and pull requests.' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - name: Evaluate repository state
        id: evaluate
        shell: bash
        run: |
          set -euo pipefail

          issues_json="$(gh issue list --state open --limit 100 --json number,title,labels,updatedAt,url)"
          prs_json="$(gh pr list --state open --limit 100 --json number,title,isDraft,reviewDecision,updatedAt,url)"

          open_issue_count="$(jq 'length' <<< "$issues_json")"
          open_pr_count="$(jq 'length' <<< "$prs_json")"
          tracker="$(jq -r '[.[] | select(any(.labels[]?; .name == "tracker"))] | sort_by(.updatedAt) | reverse | .[0].number // ""' <<< "$issues_json")"
          stale_pr_count="$(jq '[.[] | select(.isDraft == false and (.reviewDecision == "CHANGES_REQUESTED" or .reviewDecision == "REVIEW_REQUIRED"))] | length' <<< "$prs_json")"

          workflow=""
          reason=""
          tracker_arg=""

          if [[ -n "$tracker" ]]; then
            workflow="tracker-loop-dispatch.yml"
            tracker_arg="$tracker"
            reason="open tracker #$tracker found; dispatching tracker loop"
          elif (( open_issue_count > 0 || open_pr_count > 0 )); then
            workflow="weekly-backlog-curation.yml"
            reason="open issues/PRs found without an open tracker; dispatching backlog curation"
          else
            reason="no open issues or pull requests found; no workflow dispatch needed"
          fi

          {
            echo "workflow=$workflow"
            echo "tracker=$tracker_arg"
            echo "open_issue_count=$open_issue_count"
            echo "open_pr_count=$open_pr_count"
            echo "stale_pr_count=$stale_pr_count"
            echo "reason=$reason"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Autopilot evaluation"
            echo
            echo "- Open issues: $open_issue_count"
            echo "- Open pull requests: $open_pr_count"
            echo "- PRs requiring attention: $stale_pr_count"
            echo "- Selected workflow: ${workflow:-none}"
            echo "- Reason: $reason"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check target workflow activity
        id: activity
        if: steps.evaluate.outputs.workflow != ''
        shell: bash
        run: |
          set -euo pipefail

          workflow="${{ steps.evaluate.outputs.workflow }}"
          in_progress="$(gh run list --workflow "$workflow" --status in_progress --limit 1 --json databaseId --jq 'length')"
          queued="$(gh run list --workflow "$workflow" --status queued --limit 1 --json databaseId --jq 'length')"

          if (( in_progress > 0 || queued > 0 )); then
            echo "busy=true" >> "$GITHUB_OUTPUT"
            echo "Target workflow $workflow is already queued or running; skipping dispatch." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "busy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch tracker loop
        if: steps.evaluate.outputs.workflow == 'tracker-loop-dispatch.yml' && steps.activity.outputs.busy == 'false' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run tracker-loop-dispatch.yml \
            --ref "${{ github.ref_name }}" \
            -f tracker="${{ steps.evaluate.outputs.tracker }}" \
            -f context="$AUTOPILOT_CONTEXT"

      - name: Dispatch backlog curation
        if: steps.evaluate.outputs.workflow == 'weekly-backlog-curation.yml' && steps.activity.outputs.busy == 'false' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run weekly-backlog-curation.yml \
            --ref "${{ github.ref_name }}" \
            -f context="$AUTOPILOT_CONTEXT"

      - name: Report dry run
        if: steps.evaluate.outputs.workflow != '' && steps.activity.outputs.busy == 'false' && env.DRY_RUN == 'true'
        shell: bash
        run: |
          {
            echo "Dry run enabled; would dispatch ${{ steps.evaluate.outputs.workflow }}."
            if [[ -n "${{ steps.evaluate.outputs.tracker }}" ]]; then
              echo "Tracker: #${{ steps.evaluate.outputs.tracker }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

name: Factory Cycle Dispatch

on:
  workflow_dispatch:
    inputs:
      context:
        description: "Optional natural-language steering context for the entire cycle"
        required: false
        type: string
        default: "Let the logic of this domain be manifold, presently and forthcoming."

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: playground-v0-fast-factory-cycle
  cancel-in-progress: true

jobs:
  housekeeping:
    uses: ./.github/workflows/nightly-housekeeping.yml
    with:
      context: ${{ inputs.context }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
  ideation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Discovery/Ideation
        uses: geoffsee/caretta-action@v0.0.6
        with:
          task: run
          args: ideation
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  uxr-synth:
    needs: ideation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Synthesize User Research
        uses: geoffsee/caretta-action@v0.0.6
        with:
          task: run
          args: report-research
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  strategic-review:
    needs: uxr-synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Review Research
        uses: geoffsee/caretta-action@v0.0.6
        with:
          task: run
          args: strategic-review
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  sprint-planning:
    needs: strategic-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Plan Sprint
        uses: geoffsee/caretta-action@v0.0.6
        with:
          task: run
          args: sprint-planning
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

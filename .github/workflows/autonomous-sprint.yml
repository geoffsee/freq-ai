name: Autonomous Sprint 

on:
  workflow_dispatch:
    inputs:
      context:
        description: "Optional natural-language steering context"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: playground-v0-fast-autonomous-sprint
  cancel-in-progress: false

jobs:
  execute-autonomous-sprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run freq-ai autonomous sprint
        uses: geoffsee/freq-ai-action@v0.0.1
        with:
          task: autonomous-sprint
          agent: claude
          context: ${{ inputs.context }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

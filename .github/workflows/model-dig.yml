name: Refresh model catalog

# Regenerates `assets/available-models.json` from installed agent CLIs (see `scripts/model-dig.sh`).
on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-available-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libsecret for grok-cli (keytar)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install provider CLIs
        run: ./scripts/ci/install-provider-clis.sh

      - name: Add Junie to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run model dig + validate output
        # scripts/model-dig.sh emits a raw JSON blob to stdout (suppressed);
        # the curated assets/available-models.json is the side effect we keep.
        run: ./scripts/ci/model-dig.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh available-models.json (model-dig)"
          title: "chore: refresh available-models.json (model-dig)"
          body: |
            Automated update from [`scripts/model-dig.sh`](scripts/model-dig.sh) in CI.

            - [ ] Quick sanity: JSON shape still matches what `freq-ai` embeds (`crates/cli` tests).
          branch: automated/model-dig-updates
          delete-branch: true
          add-paths: assets/available-models.json

name: CLI Compat

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/agent-common/**"
      - "crates/cli/**"
      - "crates/claude/**"
      - "crates/cline/**"
      - "crates/codex/**"
      - "crates/copilot/**"
      - "crates/gemini/**"
      - "crates/grok/**"
      - "crates/junie/**"
      - "crates/xai/**"
      - "crates/cli-common/**"
      - "scripts/test-cli-compat.sh"
      - ".github/.agents/skills/cli-compat-autofix/**"
      - ".github/workflows/cli-compat.yml"

permissions:
  contents: read

jobs:
  compatibility:
    runs-on: ubuntu-latest
    outputs:
      verify_cli_failed: ${{ steps.verify_cli.outcome == 'failure' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # grok-cli pulls in keytar; Node dlopens libsecret without this on clean ubuntu-latest.
      - name: Install libsecret for grok-cli (keytar)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-0

      # `freq-ai` depends on Dioxus desktop on non-wasm targets; Linux CI needs GTK/WebKit dev packages.
      - name: Install Linux GUI build dependencies (Dioxus desktop)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Provider CLIs
        run: |
          npm install -g \
            @anthropic-ai/claude-code \
            @openai/codex \
            @github/copilot \
            @google/gemini-cli \
            cline \
            grok-cli

      - name: Install Junie CLI
        run: curl -fsSL https://junie.jetbrains.com/install.sh | bash

      - name: Add Junie to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify CLI Binaries
        id: verify_cli
        continue-on-error: true
        run: |
          claude --version
          # cline does not support --version; keep a compatibility fallback.
          cline version || cline -v
          codex --version
          copilot --version
          gemini --version
          # grok-cli version flags differ across releases.
          grok --version || grok -v || grok version
          junie --version

      - name: Fail when binary verification fails
        if: steps.verify_cli.outcome == 'failure'
        run: |
          echo "Verify CLI Binaries failed; skipping wrapper tests in this job."
          exit 1

      - name: Run Wrapper Compatibility Tests
        if: steps.verify_cli.outcome == 'success'
        run: ./scripts/test-cli-compat.sh

  codex-autofix-verify-failures:
    needs: compatibility
    if: >
      ${{
        always() &&
        github.event_name == 'pull_request' &&
        needs.compatibility.outputs.verify_cli_failed == 'true' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.actor != 'github-actions[bot]' &&
        secrets.OPENAI_API_KEY != ''
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Capture failed workflow logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view "${GITHUB_RUN_ID}" --log-failed > /tmp/cli-compat-failed.log

      - name: Ask Codex to fix CLI compatibility
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/codex-cli-compat-prompt.txt <<'EOF'
          Apply the repository skill at `.github/.agents/skills/cli-compat-autofix/SKILL.md`.
          The `CLI Compat` workflow failed in `Verify CLI Binaries`.
          Use the skill guidance and the failure logs below.
          EOF
          cat /tmp/cli-compat-failed.log >> /tmp/codex-cli-compat-prompt.txt
          codex exec --dangerously-bypass-approvals-and-sandbox "$(cat /tmp/codex-cli-compat-prompt.txt)"

      - name: Open PR with Codex fixes
        env:
          GH_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if git diff --quiet; then
            echo "No changes produced by Codex."
            exit 0
          fi

          branch="codex/cli-compat-autofix-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          cat > /tmp/codex-commit-msg-prompt.txt <<'EOF'
          Apply commit message guidance from `.github/.agents/skills/cli-compat-autofix/SKILL.md`.
          Generate the commit message from `git diff --cached`.
          Output plain text only.
          EOF

          codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            --json \
            -o /tmp/codex-commit-message.txt \
            "$(cat /tmp/codex-commit-msg-prompt.txt)"

          if [[ ! -s /tmp/codex-commit-message.txt ]]; then
            echo "Codex did not produce a commit message; aborting."
            exit 1
          fi

          git commit -F /tmp/codex-commit-message.txt
          git push -u origin "$branch"

          pr_title="$(python3 - <<'PY'
          from pathlib import Path
          lines = Path("/tmp/codex-commit-message.txt").read_text(encoding="utf-8", errors="replace").splitlines()
          subject = next((ln.strip() for ln in lines if ln.strip()), "").strip()
          print(subject[:300])
          PY
          )"

          gh pr create \
            --base "${{ github.event.pull_request.base.ref }}" \
            --head "$branch" \
            --title "${pr_title}" \
            --body "$(cat <<'EOF'
          Automated Codex remediation for a failing `Verify CLI Binaries` step in `CLI Compat`.

          - Trigger: workflow run `${{ github.run_id }}`
          - Source PR: #${{ github.event.pull_request.number }}
          EOF
          )"

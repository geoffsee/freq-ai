name: CLI Compat

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/agent-common/**"
      - "crates/cli/**"
      - "crates/claude/**"
      - "crates/cline/**"
      - "crates/codex/**"
      - "crates/copilot/**"
      - "crates/gemini/**"
      - "crates/grok/**"
      - "crates/junie/**"
      - "crates/xai/**"
      - "crates/cli-common/**"
      - "scripts/test-cli-compat.sh"
      - ".github/workflows/cli-compat.yml"

jobs:
  compatibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # grok-cli pulls in keytar; Node dlopens libsecret without this on clean ubuntu-latest.
      - name: Install libsecret for grok-cli (keytar)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-0

      # `freq-ai` depends on Dioxus desktop on non-wasm targets; Linux CI needs GTK/WebKit dev packages.
      - name: Install Linux GUI build dependencies (Dioxus desktop)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Provider CLIs
        run: |
          npm install -g \
            @anthropic-ai/claude-code \
            @openai/codex \
            @github/copilot \
            @google/gemini-cli \
            cline \
            grok-cli

      - name: Install Junie CLI
        run: curl -fsSL https://junie.jetbrains.com/install.sh | bash

      - name: Add Junie to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify CLI Binaries
        run: |
          claude --version
          # cline does not support --version; keep a compatibility fallback.
          cline version || cline -v
          codex --version
          copilot --version
          gemini --version
          # grok-cli version flags differ across releases.
          grok --version || grok -v || grok version
          junie --version

      - name: Run Wrapper Compatibility Tests
        run: ./scripts/test-cli-compat.sh

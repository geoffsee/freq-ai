name: Publish CI Image

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "my-ci/ci.Containerfile"
      - ".github/workflows/publish-ci-image.yml"

concurrency:
  group: publish-ci-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push caretta-ci image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: my-ci/ci.Containerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/geoffsee/caretta-ci:latest
            ghcr.io/geoffsee/caretta-ci:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/geoffsee/caretta-ci:buildcache
          cache-to: type=registry,ref=ghcr.io/geoffsee/caretta-ci:buildcache,mode=max

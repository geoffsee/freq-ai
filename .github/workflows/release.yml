name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: freq-ai-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: freq-ai-aarch64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: freq-ai-aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: freq-ai-x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config

      - name: Install system dependencies (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64

          # Pin existing sources to amd64 only — use a fresh file to avoid
          # corrupting vendor lists (e.g. microsoft-prod.list).
          sudo tee /etc/apt/sources.list.d/amd64-pinned.list > /dev/null <<'LIST'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ noble main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ noble-updates main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu/ noble-security main restricted universe multiverse
          LIST

          # Add arm64 ports
          sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null <<'LIST'
          deb [arch=arm64] http://ports.ubuntu.com/ noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ noble-updates main restricted universe multiverse
          LIST

          # Remove the default sources list so only our arch-pinned lists are used
          sudo rm -f /etc/apt/sources.list
          # Disable any vendor lists that don't specify an arch (they break multiarch)
          for f in /etc/apt/sources.list.d/*.list; do
            case "$f" in
              */amd64-pinned.list|*/arm64-ports.list) continue ;;
            esac
            if grep -q '^\s*deb\s' "$f" 2>/dev/null && ! grep -q '\[.*arch=' "$f" 2>/dev/null; then
              sudo mv "$f" "$f.disabled"
            fi
          done

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            libgtk-3-dev:arm64 \
            libwebkit2gtk-4.1-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            libxdo-dev:arm64 \
            libssl-dev:arm64

          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz freq-ai
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }}.zip freq-ai.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
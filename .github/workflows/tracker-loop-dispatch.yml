name: Tracker Loop Dispatch

on:
  workflow_dispatch:
    inputs:
      tracker:
        description: "Tracker issue number (for example: 1234)"
        required: true
        type: string
      context:
        description: "Optional natural-language steering context"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: tracker-loop-dispatch-${{ inputs.tracker }}
  cancel-in-progress: true

jobs:
  tracker-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run freq-ai tracker loop
        uses: geoffsee/freq-ai-action@v0.0.2
        with:
          task: loop
          args: ${{ inputs.tracker }}
          preset: software-factory
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          FREQ_AI_CONTEXT: ${{ inputs.context }}

  code-review:
    needs: tracker-loop
    if: ${{ needs.tracker-loop.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.open-prs.outputs.prs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run freq-ai code review
        uses: geoffsee/freq-ai-action@v0.0.2
        with:
          task: code-review
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          FREQ_AI_CONTEXT: ${{ inputs.context }}

      - name: List open PRs for follow-up
        id: open-prs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prs="$(gh pr list --state open --limit 50 --json number --jq '[.[].number]')"
          echo "prs=$prs" >> "$GITHUB_OUTPUT"

  fix-review-comments:
    needs: code-review
    if: ${{ needs.code-review.result == 'success' && needs.code-review.outputs.prs != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.code-review.outputs.prs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run freq-ai review follow-up
        uses: geoffsee/freq-ai-action@v0.0.2
        with:
          task: fix-pr
          args: ${{ matrix.pr }}
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          FREQ_AI_CONTEXT: ${{ inputs.context }}

name: Tracker Loop Dispatch

on:
  workflow_dispatch:
    inputs:
      tracker:
        description: "Tracker issue number (for example: 1234)"
        required: true
        type: string
      context:
        description: "Optional natural-language steering context"
        required: false
        type: string
      model:
        description: "Optional agent model override for caretta (e.g. Claude model id)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: tracker-loop-dispatch-${{ inputs.tracker }}
  cancel-in-progress: true

jobs:
  # Resolves pending child issues from the tracker body (blockers respected), emits a JSON array for the matrix below.
  # Requires a caretta release that includes the `tracker-matrix` subcommand (bundled in packages/action).
  tracker-matrix-plan:
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.plan.outputs.issues-json }}
      issue-count: ${{ steps.plan.outputs.issue-count }}
    steps:
      - uses: actions/checkout@v4

      - uses: geoffsee/caretta-action@v0.0.6
        id: plan
        with:
          task: tracker-matrix
          args: ${{ inputs.tracker }} --json
          preset: software-factory
          agent: claude
          auto: "false"
        env:
          GH_TOKEN: ${{ github.token }}

  tracker-issue:
    needs: tracker-matrix-plan
    if: ${{ needs.tracker-matrix-plan.outputs.issue-count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        issue: ${{ fromJson(needs.tracker-matrix-plan.outputs.issues) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run caretta issue
        uses: geoffsee/caretta-action@v0.0.6
        with:
          task: issue
          args: --tracker ${{ inputs.tracker }} ${{ matrix.issue }}
          preset: software-factory
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CARETTA_CONTEXT: ${{ inputs.context }}
          CARETTA_MODEL: ${{ inputs.model }}
          GH_TOKEN: ${{ github.token }}

  # Lists open PRs whose head is agent/issue-N for pending tracker children (or every agent/issue-* PR when the pending list is empty).
  # Requires caretta >= version with `caretta code-review <PR>` for matrix review jobs.
  code-review-plan:
    needs: [tracker-matrix-plan, tracker-issue]
    if: >-
      !failure() && !cancelled() &&
      (needs.tracker-matrix-plan.outputs.issue-count == '0' ||
       needs.tracker-issue.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.resolve-prs.outputs.prs }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tracker-scoped open PRs
        id: resolve-prs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUES_JSON: ${{ needs.tracker-matrix-plan.outputs.issues }}
        run: |
          set -euo pipefail

          if [[ "$(jq 'length' <<< "$ISSUES_JSON")" -eq 0 ]]; then
            prs_json="$(gh pr list --state open --limit 50 --json number,headRefName \
              --jq '[.[] | select(.headRefName | test("^agent/issue-[0-9]+$")) | .number]')"
          else
            mapfile -t nums < <(jq -r '.[]' <<< "$ISSUES_JSON")
            found=()
            for n in "${nums[@]}"; do
              num="$(gh pr list --head "agent/issue-${n}" --state open --json number -q '.[0].number // empty')"
              if [[ -n "$num" ]]; then
                found+=("$num")
              fi
            done
            if [[ ${#found[@]} -eq 0 ]]; then
              prs_json='[]'
            else
              prs_json="$(printf '%s\n' "${found[@]}" | jq -c -R -s 'split("\n") | map(select(length>0)) | unique | map(tonumber)')"
            fi
          fi
          [[ -z "$prs_json" ]] && prs_json='[]'
          # GITHUB_OUTPUT is line-oriented: pretty-printed JSON would break parsing (e.g. "Invalid format ' 77,'").
          prs_json="$(printf '%s' "$prs_json" | jq -c .)"
          echo "prs=$prs_json" >> "$GITHUB_OUTPUT"

  code-review:
    needs: [code-review-plan]
    if: >-
      needs.code-review-plan.result == 'success' &&
      needs.code-review-plan.outputs.prs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.code-review-plan.outputs.prs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run caretta code review
        uses: geoffsee/caretta-action@v0.0.6
        with:
          task: code-review
          args: ${{ matrix.pr }}
          agent: claude
        env:
          DEV_BOT_TOKEN: ${{ secrets.DEV_BOT_TOKEN }}
          DEV_BOT_APP_ID: ${{ secrets.DEV_BOT_APP_ID }}
          DEV_BOT_INSTALLATION_ID: ${{ secrets.DEV_BOT_INSTALLATION_ID }}
          DEV_BOT_PRIVATE_KEY_B64: ${{ secrets.DEV_BOT_PRIVATE_KEY_B64 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CARETTA_CONTEXT: ${{ inputs.context }}
          CARETTA_MODEL: ${{ inputs.model }}
          GH_TOKEN: ${{ github.token }}

  fix-review-comments:
    needs: [code-review-plan, code-review]
    if: >-
      needs.code-review-plan.result == 'success' &&
      needs.code-review-plan.outputs.prs != '[]' &&
      needs.code-review.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.code-review-plan.outputs.prs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run caretta review follow-up
        uses: geoffsee/caretta-action@v0.0.6
        with:
          task: fix-pr
          args: ${{ matrix.pr }}
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CARETTA_CONTEXT: ${{ inputs.context }}
          CARETTA_MODEL: ${{ inputs.model }}
          GH_TOKEN: ${{ github.token }}

  # For approved agent/issue-* PRs: merge latest base into each branch, then enable squash auto-merge.
  # Runs after review follow-up so fixes land before the queue step. Requires a caretta build with
  # `caretta auto-merge --automerge-queue`.
  prepare-automerge:
    needs: [code-review-plan, code-review, fix-review-comments]
    if: >-
      always() && !cancelled() &&
      needs.code-review-plan.result == 'success' &&
      (needs.code-review.result == 'success' || needs.code-review.result == 'skipped') &&
      (needs.fix-review-comments.result == 'success' ||
       needs.fix-review-comments.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update branches and enable auto-merge
        uses: geoffsee/caretta-action@v0.0.6
        with:
          task: auto-merge
          args: --tracker ${{ inputs.tracker }} --automerge-queue
          preset: software-factory
          agent: claude
          auto: "false"
        env:
          GH_TOKEN: ${{ github.token }}

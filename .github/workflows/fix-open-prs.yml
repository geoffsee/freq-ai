name: Fix Open PRs

on:
  workflow_dispatch:
    inputs:
      context:
        description: "Optional natural-language steering context"
        required: false
        type: string
      model:
        description: "Optional agent model override for caretta (e.g. Claude model id)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: fix-open-prs
  cancel-in-progress: true

jobs:
  list-open-prs:
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.list.outputs.prs }}
      pr-count: ${{ steps.list.outputs.pr-count }}
    steps:
      - uses: actions/checkout@v4

      - name: List open PRs
        id: list
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          prs="$(gh pr list --state open --limit 100 --json number --jq '[.[].number]')"
          count="$(jq 'length' <<<"$prs")"
          echo "prs=$prs" >> "$GITHUB_OUTPUT"
          echo "pr-count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count open PR(s): $prs"

  fix-pr:
    needs: list-open-prs
    if: ${{ needs.list-open-prs.outputs.pr-count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.list-open-prs.outputs.prs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run caretta fix-pr
        uses: geoffsee/caretta-action@v0.0.4
        with:
          task: fix-pr
          args: ${{ matrix.pr }}
          agent: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CARETTA_CONTEXT: ${{ inputs.context }}
          CARETTA_MODEL: ${{ inputs.model }}
          GH_TOKEN: ${{ github.token }}

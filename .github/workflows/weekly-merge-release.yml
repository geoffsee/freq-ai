name: Weekly merge and release

on:
  schedule:
    # Thursdays 06:00 UTC
    - cron: "0 6 * * 4"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-weekly-merge-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check OPENAI_API_KEY availability
        id: key_check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -n "${OPENAI_API_KEY}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is not configured; skipping."
          fi

      - name: Checkout
        if: steps.key_check.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Rust
        if: steps.key_check.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        if: steps.key_check.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        if: steps.key_check.outputs.present == 'true'
        run: npm install -g @openai/codex

      - name: Git identity for Codex commits
        if: steps.key_check.outputs.present == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Codex (skill-driven)
        if: steps.key_check.outputs.present == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          codex exec --dangerously-bypass-approvals-and-sandbox "$(cat <<EOF
          Follow the repository skill at .github/.agents/skills/weekly-merge-release/SKILL.md and complete the full procedure.
          EOF
          )"

[package]
name = "freq-ai"
version.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true

[lib]
name = "freq_ai"
path = "src/lib.rs"

[[bin]]
name = "freq-ai"
path = "src/main.rs"

[dependencies]
agent-common = { path = "../agent-common", version = "0.8.1" }
cli-common = { path = "../cli-common", version = "0.8.0" }
claude = { package = "freq-ai-claude", path = "../claude", version = "0.8.0" }
cline = { package = "freq-ai-cline", path = "../cline", version = "0.8.0" }
codex = { package = "freq-ai-codex", path = "../codex", version = "0.8.0" }
copilot = { package = "freq-ai-copilot", path = "../copilot", version = "0.8.0" }
gemini = { package = "freq-ai-gemini", path = "../gemini", version = "0.8.0" }
grok = { package = "freq-ai-grok", path = "../grok", version = "0.8.0" }
junie = { package = "freq-ai-junie", path = "../junie", version = "0.8.0" }
xai = { package = "freq-ai-xai", path = "../xai", version = "0.8.0" }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rust-embed = "8.5"
jsonwebtoken = "9"
toml = "0.8"
clap = { version = "4.5", features = ["derive"] }
handlebars = "6"
serde_yaml = "0.9"
indexmap = { version = "2", features = ["serde"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dioxus = { version = "0.6", features = ["desktop"] }
tokio = { version = "1", features = ["full"] }
toak-rs = { version = "6.0.2", default-features = false }
keyring = "3"
dirs = "6"
axum = "0.7"
mime_guess = "2"

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { version = "0.6", features = ["web"] }
tokio = { version = "1", features = ["rt", "sync", "macros", "time"] }
gloo-net = "0.2"

[dev-dependencies]
tempfile = "3"

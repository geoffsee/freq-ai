[package]
name = "freq-ai"
version = "0.5.2"
edition = "2024"
description = "freq-ai builds software"
license = "MIT OR Apache-2.0"

[lib]
name = "freq_ai"
path = "src/lib.rs"

[[bin]]
name = "freq-ai"
path = "src/main.rs"

[dependencies]
dioxus = { version = "0.6", features = ["desktop"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rust-embed = "8.5"
jsonwebtoken = "9"
toml = "0.8"
keyring = "3"
clap = { version = "4.5", features = ["derive"] }
toak-rs = { version = "6.0.2", default-features = false }
handlebars = "6"
serde_yaml = "0.9"
indexmap = { version = "2", features = ["serde"] }
dirs = "6"

[dev-dependencies]
tempfile = "3"

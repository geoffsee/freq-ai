name: Roadmapper
id: roadmapper
description: Transform strategic intent into a structured long-term roadmap
pattern: two_phase
context: strategic

ui:
  category: planning
  order: 40
  visible: true

depends_on:
  - strategic_review

extra_context:
  - name: strategic_review
    label: strategic-review

phases:
  draft:
    template: draft.md
    log_start: "Starting roadmapper draft..."
    log_complete: "Draft complete — review the roadmap above and provide feedback."
  finalize:
    template: finalize.md
    log_start: "Finalising roadmap with feedback..."
    log_complete: "Roadmap complete — issue filed."

fragments:
  roadmap_phases: |
    ## Create a long-term Roadmap based on the Strategic Review:

    ### Phase 1: Foundation (Next 1-2 Sprints)
    - What critical blockers or technical debt must be addressed immediately?
    - Which core features need stabilization before further expansion?

    ### Phase 2: Expansion (Next 2-4 Sprints)
    - What primary capabilities will unlock new user segments or use cases?
    - How will the system scale to handle increased load or node types?

    ### Phase 3: Ecosystem (Future)
    - How will Freq Cloud integrate with external systems, clouds, or developer tools?
    - What are the long-term extensibility and sustainability goals?

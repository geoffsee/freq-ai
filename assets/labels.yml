# ── Workflow labels (no prefix) ─────────────────────────────────────────────
# Identifies which dev-UI workflow produced or owns the issue.

- name: tracker
  description: "Parent/epic issue grouping a batch of children"
  color: "7B61FF"

- name: ideation
  description: "Output of the Ideation workflow"
  color: "9B59B6"

- name: uxr-synthesis
  description: "Output of the UXR Synth workflow"
  color: "8E44AD"

- name: strategic-review
  description: "Output of the Strategic Review workflow"
  color: "6C3483"

- name: roadmap
  description: "Output of the Roadmapper workflow"
  color: "E67E22"

- name: sprint
  description: "Output of the Sprint Planning workflow"
  color: "A569BD"

- name: code-review
  description: "Output of the Code Review workflow"
  color: "BB8FCE"

- name: security
  description: "Output of the Security Code Review workflow"
  color: "C39BD3"

- name: retrospective
  description: "Output of the Retrospective workflow"
  color: "D2B4DE"

- name: market-research
  description: "Output of the Market Research workflow"
  color: "1ABC9C"

- name: partnership-outreach
  description: "Output of the Partnership Outreach workflow"
  color: "2ECC71"

- name: sales-prospecting
  description: "Output of the Sales Prospecting workflow"
  color: "3498DB"


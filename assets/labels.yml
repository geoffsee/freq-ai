# ── kind: — what kind of work ───────────────────────────────────────────────

- name: "kind:bug"
  description: "Something is broken"
  color: "D73A4A"

- name: "kind:feature"
  description: "New capability"
  color: "0075CA"

- name: "kind:refactor"
  description: "Structural change, no behaviour change"
  color: "CFD3D7"

- name: "kind:perf"
  description: "Performance improvement"
  color: "F9D0C4"

- name: "kind:test"
  description: "Test-only changes"
  color: "BFD4F2"

- name: "kind:docs"
  description: "Docs-only changes"
  color: "0075CA"

- name: "kind:chore"
  description: "Tooling, deps, housekeeping"
  color: "EDEDED"

- name: "kind:security"
  description: "Security fix or hardening (distinct from security workflow label)"
  color: "E11D48"

# ── severity: — for security findings and bugs ──────────────────────────────
# Strict ordering: critical > high > medium > low > info.

- name: "severity:critical"
  description: "Exploit possible, ship a fix immediately"
  color: "B60205"

- name: "severity:high"
  description: "Exploit plausible or major data integrity risk"
  color: "D93F0B"

- name: "severity:medium"
  description: "Meaningful risk but mitigated"
  color: "E99695"

- name: "severity:low"
  description: "Minor issue, fix when convenient"
  color: "F9D0C4"

- name: "severity:info"
  description: "Observation, no action required"
  color: "FEF2C0"

# ── priority: — sprint scheduling ───────────────────────────────────────────

- name: "priority:p0"
  description: "Must ship in current sprint"
  color: "00008B"

- name: "priority:p1"
  description: "Should ship in current sprint"
  color: "0052CC"

- name: "priority:p2"
  description: "Next sprint"
  color: "4A90D9"

- name: "priority:p3"
  description: "Backlog"
  color: "C5DEF5"

# ── status: — current state (rare) ──────────────────────────────────────────

- name: "status:blocked"
  description: "Waiting on an external input or unblocking issue"
  color: "FFA500"

- name: "status:needs-review"
  description: "Implementation done, awaiting human review"
  color: "FBCA04"

- name: "status:wontfix"
  description: "Declined — replaces the default wontfix label"
  color: "FFFFFF"

# ── Grandfathered GitHub defaults ────────────────────────────────────────────
# Kept for backward compatibility. Prefer kind: labels for new issues.

- name: bug
  description: "Something isn't working (prefer kind:bug for new issues)"
  color: "D73A4A"

- name: enhancement
  description: "New feature or request (prefer kind:feature for new issues)"
  color: "A2EEEF"

- name: documentation
  description: "Improvements or additions to documentation (prefer kind:docs)"
  color: "0075CA"

- name: "good first issue"
  description: "Good for newcomers"
  color: "7057FF"

- name: "help wanted"
  description: "Extra attention is needed"
  color: "008672"

- name: duplicate
  description: "This issue or pull request already exists"
  color: "CFD3D7"

- name: invalid
  description: "This doesn't seem right"
  color: "E4E669"

- name: question
  description: "Further information is requested"
  color: "D876E3"

- name: wontfix
  description: "This will not be worked on (prefer status:wontfix)"
  color: "FFFFFF"
